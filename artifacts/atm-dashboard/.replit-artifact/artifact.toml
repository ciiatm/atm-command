kind = "web"
previewPath = "/"
title = "ATM Back Office"
version = "1.0.0"
id = "artifacts/atm-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23677

[services.development]
run = "pnpm --filter @workspace/atm-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/atm-dashboard", "run", "build" ]
publicDir = "artifacts/atm-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23677"
BASE_PATH = "/"
