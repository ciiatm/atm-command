openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ATM Back Office API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: atms
    description: ATM machine management
  - name: dashboard
    description: Dashboard summaries and analytics
  - name: portals
    description: Portal credential management and sync
  - name: cash-planning
    description: Cash fill planning and recommendations
  - name: routes
    description: Route planning for ATM fills
  - name: alerts
    description: Alert management
  - name: bookkeeping
    description: Financial accounts and transactions
  - name: mileage
    description: Mileage log management
  - name: payroll
    description: Employee and payroll management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── ATMs ───────────────────────────────────────────────────────────────────
  /atms:
    get:
      operationId: listAtms
      tags: [atms]
      summary: List all ATMs with current status
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [online, offline, error, low_cash, all]
          required: false
        - in: query
          name: portal
          schema:
            type: string
          required: false
      responses:
        "200":
          description: List of ATMs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Atm"
    post:
      operationId: createAtm
      tags: [atms]
      summary: Create a new ATM record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAtmBody"
      responses:
        "201":
          description: Created ATM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Atm"

  /atms/{id}:
    get:
      operationId: getAtm
      tags: [atms]
      summary: Get ATM detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ATM detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtmDetail"
    put:
      operationId: updateAtm
      tags: [atms]
      summary: Update ATM record
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAtmBody"
      responses:
        "200":
          description: Updated ATM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Atm"
    delete:
      operationId: deleteAtm
      tags: [atms]
      summary: Delete ATM record
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /atms/{id}/transactions:
    get:
      operationId: getAtmTransactions
      tags: [atms]
      summary: Get ATM transaction history
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: days
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AtmTransaction"

  # ─── Dashboard ──────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/cash-flow:
    get:
      operationId: getDashboardCashFlow
      tags: [dashboard]
      summary: Get daily cash flow data for charts
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Cash flow chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashFlowDataPoint"

  /dashboard/top-atms:
    get:
      operationId: getDashboardTopAtms
      tags: [dashboard]
      summary: Get top performing ATMs by transaction volume
      responses:
        "200":
          description: Top ATMs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AtmPerformance"

  /dashboard/alerts-summary:
    get:
      operationId: getDashboardAlertsSummary
      tags: [dashboard]
      summary: Get active alerts grouped by severity
      responses:
        "200":
          description: Alerts summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsSummary"

  # ─── Portals ────────────────────────────────────────────────────────────────
  /portals:
    get:
      operationId: listPortals
      tags: [portals]
      summary: List portal credentials
      responses:
        "200":
          description: Portal credentials (passwords omitted)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Portal"
    post:
      operationId: createPortal
      tags: [portals]
      summary: Add a new portal credential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePortalBody"
      responses:
        "201":
          description: Created portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portal"

  /portals/{id}:
    put:
      operationId: updatePortal
      tags: [portals]
      summary: Update portal credential
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePortalBody"
      responses:
        "200":
          description: Updated portal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portal"
    delete:
      operationId: deletePortal
      tags: [portals]
      summary: Delete portal credential
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /portals/{id}/sync:
    post:
      operationId: syncPortal
      tags: [portals]
      summary: Trigger sync for a specific portal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /portals/sync-all:
    post:
      operationId: syncAllPortals
      tags: [portals]
      summary: Trigger sync for all portals
      responses:
        "200":
          description: Sync results for all portals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SyncResult"

  /portals/sync-history:
    get:
      operationId: getPortalSyncHistory
      tags: [portals]
      summary: Get recent sync history
      responses:
        "200":
          description: Sync history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SyncHistory"

  # ─── Cash Planning ──────────────────────────────────────────────────────────
  /cash-planning/calculate:
    post:
      operationId: calculateFills
      tags: [cash-planning]
      summary: Calculate how much cash to load in each ATM for N days
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateFillsBody"
      responses:
        "200":
          description: Fill recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FillRecommendation"

  /fills:
    get:
      operationId: listFills
      tags: [cash-planning]
      summary: List fill orders
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, in_progress, completed, all]
          required: false
      responses:
        "200":
          description: Fill orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FillOrder"
    post:
      operationId: createFill
      tags: [cash-planning]
      summary: Create a fill order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFillBody"
      responses:
        "201":
          description: Created fill order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FillOrder"

  /fills/{id}:
    put:
      operationId: updateFill
      tags: [cash-planning]
      summary: Update fill order status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFillBody"
      responses:
        "200":
          description: Updated fill order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FillOrder"

  # ─── Routes ─────────────────────────────────────────────────────────────────
  /routes:
    get:
      operationId: listRoutes
      tags: [routes]
      summary: List planned routes
      responses:
        "200":
          description: Routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Route"
    post:
      operationId: planRoute
      tags: [routes]
      summary: Plan an optimized fill route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanRouteBody"
      responses:
        "201":
          description: Planned route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"

  /routes/{id}:
    get:
      operationId: getRoute
      tags: [routes]
      summary: Get route detail with stops
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Route detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteDetail"
    put:
      operationId: updateRoute
      tags: [routes]
      summary: Update route status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRouteBody"
      responses:
        "200":
          description: Updated route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"

  # ─── Alerts ─────────────────────────────────────────────────────────────────
  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List alerts
      parameters:
        - in: query
          name: severity
          schema:
            type: string
            enum: [critical, warning, info, all]
          required: false
        - in: query
          name: resolved
          schema:
            type: boolean
          required: false
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/{id}/resolve:
    put:
      operationId: resolveAlert
      tags: [alerts]
      summary: Resolve an alert
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resolved alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alert-rules:
    get:
      operationId: listAlertRules
      tags: [alerts]
      summary: List alert rules
      responses:
        "200":
          description: Alert rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertRule"
    post:
      operationId: createAlertRule
      tags: [alerts]
      summary: Create alert rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlertRuleBody"
      responses:
        "201":
          description: Created alert rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertRule"

  /alert-rules/{id}:
    delete:
      operationId: deleteAlertRule
      tags: [alerts]
      summary: Delete alert rule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Bookkeeping ────────────────────────────────────────────────────────────
  /accounts:
    get:
      operationId: listAccounts
      tags: [bookkeeping]
      summary: List financial accounts
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [bookkeeping]
      summary: Add a financial account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountBody"
      responses:
        "201":
          description: Created account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{id}:
    put:
      operationId: updateAccount
      tags: [bookkeeping]
      summary: Update account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountBody"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    delete:
      operationId: deleteAccount
      tags: [bookkeeping]
      summary: Delete account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /book-transactions:
    get:
      operationId: listBookTransactions
      tags: [bookkeeping]
      summary: List financial transactions
      parameters:
        - in: query
          name: accountId
          schema:
            type: integer
          required: false
        - in: query
          name: category
          schema:
            type: string
          required: false
        - in: query
          name: startDate
          schema:
            type: string
            format: date
          required: false
        - in: query
          name: endDate
          schema:
            type: string
            format: date
          required: false
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookTransaction"
    post:
      operationId: createBookTransaction
      tags: [bookkeeping]
      summary: Add a financial transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookTransactionBody"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookTransaction"

  /book-transactions/{id}:
    delete:
      operationId: deleteBookTransaction
      tags: [bookkeeping]
      summary: Delete transaction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bookkeeping/summary:
    get:
      operationId: getBookkeepingSummary
      tags: [bookkeeping]
      summary: Get income/expense summary by category
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date
          required: false
        - in: query
          name: endDate
          schema:
            type: string
            format: date
          required: false
      responses:
        "200":
          description: Bookkeeping summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookkeepingSummary"

  # ─── Mileage ────────────────────────────────────────────────────────────────
  /mileage:
    get:
      operationId: listMileageLogs
      tags: [mileage]
      summary: List mileage logs
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date
          required: false
        - in: query
          name: endDate
          schema:
            type: string
            format: date
          required: false
      responses:
        "200":
          description: Mileage logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MileageLog"
    post:
      operationId: createMileageLog
      tags: [mileage]
      summary: Add a mileage log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMileageLogBody"
      responses:
        "201":
          description: Created mileage log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MileageLog"

  /mileage/{id}:
    delete:
      operationId: deleteMileageLog
      tags: [mileage]
      summary: Delete mileage log
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /mileage/summary:
    get:
      operationId: getMileageSummary
      tags: [mileage]
      summary: Get total mileage stats
      responses:
        "200":
          description: Mileage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MileageSummary"

  # ─── Payroll ────────────────────────────────────────────────────────────────
  /employees:
    get:
      operationId: listEmployees
      tags: [payroll]
      summary: List employees
      responses:
        "200":
          description: Employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [payroll]
      summary: Add an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "201":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    put:
      operationId: updateEmployee
      tags: [payroll]
      summary: Update employee
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeBody"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /payroll:
    get:
      operationId: listPayroll
      tags: [payroll]
      summary: List payroll records
      parameters:
        - in: query
          name: employeeId
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: Payroll records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayrollRecord"
    post:
      operationId: createPayroll
      tags: [payroll]
      summary: Create a payroll record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePayrollBody"
      responses:
        "201":
          description: Created payroll record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRecord"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── ATM ──
    Atm:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        locationName:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        serialNumber:
          type: string
        portalSource:
          type: string
          enum: [columbus_data, switch_commerce, atm_transact, manual]
        portalAtmId:
          type: string
        cashCapacity:
          type: number
        currentBalance:
          type: number
        lowCashThreshold:
          type: number
        status:
          type: string
          enum: [online, offline, error, low_cash, unknown]
        lastSynced:
          type: string
          format: date-time
        avgDailyTransactions:
          type: number
        avgDailyDispensed:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - locationName
        - address
        - city
        - state
        - portalSource
        - cashCapacity
        - currentBalance
        - lowCashThreshold
        - status
        - createdAt

    AtmDetail:
      allOf:
        - $ref: "#/components/schemas/Atm"
        - type: object
          properties:
            recentAlerts:
              type: array
              items:
                $ref: "#/components/schemas/Alert"
            fillHistory:
              type: array
              items:
                $ref: "#/components/schemas/FillOrder"

    CreateAtmBody:
      type: object
      properties:
        name:
          type: string
        locationName:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        serialNumber:
          type: string
        portalSource:
          type: string
          enum: [columbus_data, switch_commerce, atm_transact, manual]
        portalAtmId:
          type: string
        cashCapacity:
          type: number
        lowCashThreshold:
          type: number
      required:
        - name
        - locationName
        - address
        - city
        - state
        - portalSource
        - cashCapacity
        - lowCashThreshold

    UpdateAtmBody:
      type: object
      properties:
        name:
          type: string
        locationName:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        serialNumber:
          type: string
        cashCapacity:
          type: number
        lowCashThreshold:
          type: number
        status:
          type: string
          enum: [online, offline, error, low_cash, unknown]

    AtmTransaction:
      type: object
      properties:
        id:
          type: integer
        atmId:
          type: integer
        date:
          type: string
          format: date
        transactionCount:
          type: integer
        totalDispensed:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - atmId
        - date
        - transactionCount
        - totalDispensed
        - createdAt

    # ── Dashboard ──
    DashboardSummary:
      type: object
      properties:
        totalAtms:
          type: integer
        onlineAtms:
          type: integer
        offlineAtms:
          type: integer
        lowCashAtms:
          type: integer
        errorAtms:
          type: integer
        totalCashDeployed:
          type: number
        totalActiveAlerts:
          type: integer
        criticalAlerts:
          type: integer
        pendingFills:
          type: integer
        avgDailyTransactions:
          type: number
        todayDispensed:
          type: number
        monthlyRevenue:
          type: number
      required:
        - totalAtms
        - onlineAtms
        - offlineAtms
        - lowCashAtms
        - errorAtms
        - totalCashDeployed
        - totalActiveAlerts
        - criticalAlerts
        - pendingFills
        - avgDailyTransactions
        - todayDispensed
        - monthlyRevenue

    CashFlowDataPoint:
      type: object
      properties:
        date:
